# Deploy Configuration for Mota Framework
# This file centralizes deploy settings and package information

packages:
  - name: '@imoogle/core'
    critical: true
  - name: '@imoogle/workbench'
    critical: true
  - name: '@imoogle/stream-client'
    critical: false
  - name: '@imoogle/stream-client-browser'
    critical: false
  - name: '@imoogle/stream-client-node'
    critical: false
  - name: '@imoogle/stream-client-react'
    critical: false
  - name: 'mota'
    critical: true
  - name: '@imoogle/test'
    critical: false

npm_tags:
  pre_release: 'pre-release'
  stable: 'latest'

environments:
  test:
    name: 'staging'
    url: 'https://staging.mota.dev'
  production:
    name: 'production'
    url: 'https://mota.dev'

notifications:
  teams:
    - '@imoogle/core-team'
  labels:
    success: ['release', 'deployed']
    failure: ['release-failure', 'high-priority', 'bug']

timeouts:
  e2e_tests: 30 # minutes
  deploy_total: 60 # minutes

retry:
  e2e_tests: 2
  npm_publish: 3
